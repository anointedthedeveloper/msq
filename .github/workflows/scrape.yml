name: Scrape Past Questions

on:
  # Runs daily at 2am UTC — scrapes all subjects to pick up new questions
  # Note: GitHub only activates scheduled runs after the workflow has been
  # triggered manually at least once.
  schedule:
    - cron: "0 2 * * *"
  # Manual trigger from the GitHub Actions tab
  workflow_dispatch:
    inputs:
      subject:
        description: "Subjects to scrape — comma separated (e.g. mathematics,physics,chemistry) or leave empty for ALL 37"
        required: false
        default: ""
      pages:
        description: "Max pages per subject (leave empty for all pages)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Scrape and commit per subject
        env:
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
        run: |
          INPUT_SUBJECT="${{ github.event.inputs.subject }}"
          INPUT_PAGES="${{ github.event.inputs.pages }}"

          PAGES_ARG=""
          if [ -n "$INPUT_PAGES" ]; then
            PAGES_ARG="--pages $INPUT_PAGES"
          fi

          if [ -n "$INPUT_SUBJECT" ]; then
            # Support comma-separated list: "mathematics,physics,chemistry"
            SUBJECTS=$(echo "$INPUT_SUBJECT" | tr ',' ' ')
          else
            SUBJECTS="mathematics english-language chemistry physics biology geography literature-in-english economics commerce accounts-principles-of-accounts government christian-religious-knowledge-crk agricultural-science islamic-religious-knowledge-irk history fine-arts music french animal-husbandry insurance civic-education further-mathematics yoruba igbo arabic home-economics hausa book-keeping data-processing catering-craft-practice computer-studies marketing physical-education office-practice technical-drawing food-and-nutrition home-management"
          fi

          TOTAL_NEW=0
          FAILED_SUBJECTS=""

          for SUBJECT in $SUBJECTS; do
            echo ""
            echo "Subject: $SUBJECT"

            if python scraper.py --subject "$SUBJECT" $PAGES_ARG; then
              echo "Scrape OK: $SUBJECT"
            else
              echo "::warning::Scrape failed for $SUBJECT"
              FAILED_SUBJECTS="$FAILED_SUBJECTS $SUBJECT"
              continue
            fi

            if python verify.py --subject "$SUBJECT"; then
              echo "Verify OK: $SUBJECT"
            else
              echo "::warning::Verification issues for $SUBJECT, running fix"
              python verify.py --subject "$SUBJECT" --fix || true
            fi

            git add "questions/${SUBJECT}.json"

            if git diff --cached --quiet; then
              echo "No new questions for $SUBJECT"
            else
              COUNT=$(python -c "import json,sys; print(len(json.load(open('questions/'+sys.argv[1]+'.json',encoding='utf-8'))))" "$SUBJECT" 2>/dev/null || echo "?")
              TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
              git commit -m "scrape($SUBJECT): $COUNT questions [$TIMESTAMP]"
              git push
              echo "Committed: $SUBJECT ($COUNT questions)"
              TOTAL_NEW=$((TOTAL_NEW + 1))
            fi
          done

          echo ""
          echo "Scrape complete. Subjects with new data: $TOTAL_NEW"
          if [ -n "$FAILED_SUBJECTS" ]; then
            echo "::warning::Failed subjects: $FAILED_SUBJECTS"
          fi

      - name: Verify all question files
        run: python verify.py

      - name: Write job summary
        if: always()
        run: |
          echo "## Scrape Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Subject | Questions | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          for f in questions/*.json; do
            SUBJECT=$(basename "$f" .json)
            COUNT=$(python -c "import json; print(len(json.load(open('$f', encoding='utf-8'))))" 2>/dev/null || echo "error")
            if [ "$COUNT" = "error" ]; then
              echo "| $SUBJECT | - | FAILED |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $SUBJECT | $COUNT | OK |" >> $GITHUB_STEP_SUMMARY
            fi
          done
